services:
  postgres:
    image: postgres:16
    container_name: postgres_blog_fiap
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog_fiap

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog_fiap"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: api_blog_fiap
    restart: always

    ports:
      - "4000:4000"

    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: blog_fiap

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: